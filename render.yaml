services:
  - type: web
    name: campus-connect
    env: node
    plan: free # Can be upgraded to starter/standard as needed
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # Supabase / PostgreSQL Config (REQUIRED)
      - key: SUPABASE_URL
        sync: false # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # Set manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false # Set manually in Render dashboard

      # JWT Secret (Auto-generated by Render at setup)
      - key: JWT_SECRET
        generateValue: true

      # Client & Server URL cross-references
      - key: APP_URL
        sync: false # Set manually in Render dashboard (e.g., https://campus-connect.onrender.com)
      - key: CLIENT_URL
        sync: false # Set manually in Render dashboard (e.g., https://campus-connect.onrender.com)
      - key: VITE_API_URL
        sync: false # Set manually in Render dashboard (e.g., https://campus-connect.onrender.com)

      # Nodemailer / SMTP Configurations (Optional)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

      # Cloudinary Config for persistent file storage (Optional, falls back to local uploads/)
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
